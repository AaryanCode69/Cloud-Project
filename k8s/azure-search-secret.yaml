apiVersion: v1
kind: Secret
metadata:
  name: azure-search-secret
  namespace: cloud-project
type: Opaque
stringData:
  AZURE_SEARCH_ENDPOINT: "https://<your-search-service>.search.windows.net"
  AZURE_SEARCH_API_KEY: "<your-search-api-key>"
  AZURE_SEARCH_INDEX_NAME: "products"
  AZURE_SEARCH_SEMANTIC_CONFIGURATION_NAME: "products-semantic-config"
  AZURE_SEARCH_SEMANTIC_ENABLED: "false"
  AZURE_SEARCH_FUZZY_ENABLED: "true"
