apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: cloud-project
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
        - name: product-service
          image: apnacloudproject.azurecr.io/product-service:v7
          ports:
            - containerPort: 8082
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "postgres"
            - name: POSTGRES_DATASOURCE_URL
              value: "jdbc:postgresql://postgres:5432/productdb"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres:5432/productdb"
            - name: POSTGRES_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: "update"
            - name: SERVER_PORT
              value: "8082"
            - name: AZURE_ENTRA_TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: azure-entra-secret
                  key: AZURE_ENTRA_TENANT_ID
                  optional: true
            - name: AZURE_ENTRA_API_AUDIENCE
              valueFrom:
                secretKeyRef:
                  name: azure-entra-secret
                  key: AZURE_ENTRA_API_AUDIENCE
                  optional: true
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI
              valueFrom:
                secretKeyRef:
                  name: azure-entra-secret
                  key: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI
                  optional: true
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_AUDIENCES
              valueFrom:
                secretKeyRef:
                  name: azure-entra-secret
                  key: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_AUDIENCES
                  optional: true
            - name: COSMOS_URI
              valueFrom:
                secretKeyRef:
                  name: cosmos-secret
                  key: COSMOS_URI
            - name: COSMOS_KEY
              valueFrom:
                secretKeyRef:
                  name: cosmos-secret
                  key: COSMOS_KEY
            - name: COSMOS_DB_PRODUCT
              valueFrom:
                secretKeyRef:
                  name: cosmos-secret
                  key: COSMOS_DB_PRODUCT
            - name: AZURE_SEARCH_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: azure-search-secret
                  key: AZURE_SEARCH_ENDPOINT
            - name: SEARCH_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: azure-search-secret
                  key: AZURE_SEARCH_ENDPOINT
            - name: AZURE_SEARCH_API_KEY
              valueFrom:
                secretKeyRef:
                  name: azure-search-secret
                  key: AZURE_SEARCH_API_KEY
            - name: SEARCH_API_KEY
              valueFrom:
                secretKeyRef:
                  name: azure-search-secret
                  key: AZURE_SEARCH_API_KEY
            - name: AZURE_SEARCH_INDEX_NAME
              valueFrom:
                secretKeyRef:
                  name: azure-search-secret
                  key: AZURE_SEARCH_INDEX_NAME
            - name: AZURE_SEARCH_SEMANTIC_CONFIGURATION_NAME
              valueFrom:
                secretKeyRef:
                  name: azure-search-secret
                  key: AZURE_SEARCH_SEMANTIC_CONFIGURATION_NAME
                  optional: true
            - name: AZURE_SEARCH_SEMANTIC_ENABLED
              valueFrom:
                secretKeyRef:
                  name: azure-search-secret
                  key: AZURE_SEARCH_SEMANTIC_ENABLED
                  optional: true
            - name: AZURE_SEARCH_FUZZY_ENABLED
              valueFrom:
                secretKeyRef:
                  name: azure-search-secret
                  key: AZURE_SEARCH_FUZZY_ENABLED
                  optional: true
            - name: SEARCH_SEMANTIC_CONFIGURATION_NAME
              valueFrom:
                secretKeyRef:
                  name: azure-search-secret
                  key: AZURE_SEARCH_SEMANTIC_CONFIGURATION_NAME
                  optional: true
            - name: SEARCH_SEMANTIC_ENABLED
              valueFrom:
                secretKeyRef:
                  name: azure-search-secret
                  key: AZURE_SEARCH_SEMANTIC_ENABLED
                  optional: true
            - name: SEARCH_FUZZY_ENABLED
              valueFrom:
                secretKeyRef:
                  name: azure-search-secret
                  key: AZURE_SEARCH_FUZZY_ENABLED
                  optional: true
            - name: SEARCH_INDEX_NAME
              valueFrom:
                secretKeyRef:
                  name: azure-search-secret
                  key: AZURE_SEARCH_INDEX_NAME
            - name: FEATURE_COSMOS
              value: "true"
            - name: FEATURE_COSMOS_CATALOG_ENABLED
              value: "true"
            - name: FEATURE_COSMOS_CART_ENABLED
              value: "false"
            - name: FEATURE_SERVICEBUS_ENABLED
              value: "false"
            - name: FEATURE_AISEARCH_ENABLED
              value: "false"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: cloud-project
spec:
  selector:
    app: product-service
  ports:
    - port: 8082
      targetPort: 8082
