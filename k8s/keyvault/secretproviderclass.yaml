apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: cloud-project-kv-sync
  namespace: cloud-project
spec:
  provider: azure
  secretObjects:
    - secretName: azure-sql-secret
      type: Opaque
      data:
        - objectName: USER_SERVICE_DATASOURCE_URL
          key: USER_SERVICE_DATASOURCE_URL
        - objectName: INVENTORY_SERVICE_DATASOURCE_URL
          key: INVENTORY_SERVICE_DATASOURCE_URL
        - objectName: ORDER_SERVICE_DATASOURCE_URL
          key: ORDER_SERVICE_DATASOURCE_URL
        - objectName: AZURE_SQL_USERNAME
          key: AZURE_SQL_USERNAME
        - objectName: AZURE_SQL_PASSWORD
          key: AZURE_SQL_PASSWORD
    - secretName: azure-servicebus-secret
      type: Opaque
      data:
        - objectName: AZURE_SERVICEBUS_CONNECTION_STRING
          key: AZURE_SERVICEBUS_CONNECTION_STRING
        - objectName: AZURE_SERVICEBUS_QUEUE_NAME
          key: AZURE_SERVICEBUS_QUEUE_NAME
    - secretName: azure-search-secret
      type: Opaque
      data:
        - objectName: AZURE_SEARCH_ENDPOINT
          key: AZURE_SEARCH_ENDPOINT
        - objectName: AZURE_SEARCH_API_KEY
          key: AZURE_SEARCH_API_KEY
        - objectName: AZURE_SEARCH_INDEX_NAME
          key: AZURE_SEARCH_INDEX_NAME
        - objectName: AZURE_SEARCH_SEMANTIC_CONFIGURATION_NAME
          key: AZURE_SEARCH_SEMANTIC_CONFIGURATION_NAME
        - objectName: AZURE_SEARCH_SEMANTIC_ENABLED
          key: AZURE_SEARCH_SEMANTIC_ENABLED
        - objectName: AZURE_SEARCH_FUZZY_ENABLED
          key: AZURE_SEARCH_FUZZY_ENABLED
    - secretName: cosmos-secret
      type: Opaque
      data:
        - objectName: COSMOS_URI
          key: COSMOS_URI
        - objectName: COSMOS_KEY
          key: COSMOS_KEY
        - objectName: COSMOS_DB_PRODUCT
          key: COSMOS_DB_PRODUCT
        - objectName: COSMOS_DB_ORDER
          key: COSMOS_DB_ORDER
    - secretName: azure-entra-secret
      type: Opaque
      data:
        - objectName: AZURE_ENTRA_TENANT_ID
          key: AZURE_ENTRA_TENANT_ID
        - objectName: AZURE_ENTRA_API_AUDIENCE
          key: AZURE_ENTRA_API_AUDIENCE
        - objectName: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI
          key: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI
        - objectName: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_AUDIENCES
          key: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_AUDIENCES
    - secretName: app-config-secret
      type: Opaque
      data:
        - objectName: AZURE_APPCONFIG_ENDPOINT
          key: AZURE_APPCONFIG_ENDPOINT
    - secretName: blob-storage-secret
      type: Opaque
      data:
        - objectName: AZURE_STORAGE_ACCOUNT_NAME
          key: AZURE_STORAGE_ACCOUNT_NAME
        - objectName: AZURE_STORAGE_ACCOUNT_KEY
          key: AZURE_STORAGE_ACCOUNT_KEY
        - objectName: AZURE_STORAGE_BLOB_ENDPOINT
          key: AZURE_STORAGE_BLOB_ENDPOINT
        - objectName: AZURE_STORAGE_CONTAINER
          key: AZURE_STORAGE_CONTAINER
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: "<workload-identity-client-id>"
    keyvaultName: "<your-key-vault-name>"
    tenantId: "<tenant-id>"
    objects: |
      array:
        - |
          objectName: USER_SERVICE_DATASOURCE_URL
          objectType: secret
        - |
          objectName: INVENTORY_SERVICE_DATASOURCE_URL
          objectType: secret
        - |
          objectName: ORDER_SERVICE_DATASOURCE_URL
          objectType: secret
        - |
          objectName: AZURE_SQL_USERNAME
          objectType: secret
        - |
          objectName: AZURE_SQL_PASSWORD
          objectType: secret
        - |
          objectName: AZURE_SERVICEBUS_CONNECTION_STRING
          objectType: secret
        - |
          objectName: AZURE_SERVICEBUS_QUEUE_NAME
          objectType: secret
        - |
          objectName: AZURE_SEARCH_ENDPOINT
          objectType: secret
        - |
          objectName: AZURE_SEARCH_API_KEY
          objectType: secret
        - |
          objectName: AZURE_SEARCH_INDEX_NAME
          objectType: secret
        - |
          objectName: AZURE_SEARCH_SEMANTIC_CONFIGURATION_NAME
          objectType: secret
        - |
          objectName: AZURE_SEARCH_SEMANTIC_ENABLED
          objectType: secret
        - |
          objectName: AZURE_SEARCH_FUZZY_ENABLED
          objectType: secret
        - |
          objectName: COSMOS_URI
          objectType: secret
        - |
          objectName: COSMOS_KEY
          objectType: secret
        - |
          objectName: COSMOS_DB_PRODUCT
          objectType: secret
        - |
          objectName: COSMOS_DB_ORDER
          objectType: secret
        - |
          objectName: AZURE_ENTRA_TENANT_ID
          objectType: secret
        - |
          objectName: AZURE_ENTRA_API_AUDIENCE
          objectType: secret
        - |
          objectName: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI
          objectType: secret
        - |
          objectName: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_AUDIENCES
          objectType: secret
        - |
          objectName: AZURE_APPCONFIG_ENDPOINT
          objectType: secret
        - |
          objectName: AZURE_STORAGE_ACCOUNT_NAME
          objectType: secret
        - |
          objectName: AZURE_STORAGE_ACCOUNT_KEY
          objectType: secret
        - |
          objectName: AZURE_STORAGE_BLOB_ENDPOINT
          objectType: secret
        - |
          objectName: AZURE_STORAGE_CONTAINER
          objectType: secret
