apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: cloud-project
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: apnacloudproject.azurecr.io/order-service:v2
          ports:
            - containerPort: 8084
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "azure-sql"
            - name: POSTGRES_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-app-secret
                  key: ORDER_SERVICE_DATASOURCE_URL
            - name: POSTGRES_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-app-secret
                  key: POSTGRES_DATASOURCE_USERNAME
            - name: POSTGRES_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-app-secret
                  key: POSTGRES_DATASOURCE_PASSWORD
            - name: AZURE_SQL_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: azure-sql-secret
                  key: ORDER_SERVICE_DATASOURCE_URL
            - name: AZURE_SQL_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: azure-sql-secret
                  key: AZURE_SQL_USERNAME
            - name: AZURE_SQL_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: azure-sql-secret
                  key: AZURE_SQL_PASSWORD
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: "update"
            - name: SERVER_PORT
              value: "8084"
            - name: EXTERNAL_PRODUCT_SERVICE_URL
              value: "http://product-service:8082"
            - name: EXTERNAL_INVENTORY_SERVICE_URL
              value: "http://inventory-service:8083"
            - name: FEATURE_COSMOS_CATALOG_ENABLED
              value: "false"
            - name: FEATURE_COSMOS_CART_ENABLED
              value: "false"
            - name: FEATURE_SERVICEBUS_ENABLED
              value: "false"
            - name: FEATURE_AISEARCH_ENABLED
              value: "false"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 30
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: cloud-project
spec:
  selector:
    app: order-service
  ports:
    - port: 8084
      targetPort: 8084
