apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: cloud-project
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: apnacloudproject.azurecr.io/user-service:v2
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_APPLICATION_NAME
              value: "user-service"
            - name: SPRING_PROFILES_ACTIVE
              value: "azure-sql"
            - name: POSTGRES_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-app-secret
                  key: USER_SERVICE_DATASOURCE_URL
            - name: POSTGRES_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-app-secret
                  key: POSTGRES_DATASOURCE_USERNAME
            - name: POSTGRES_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-app-secret
                  key: POSTGRES_DATASOURCE_PASSWORD
            - name: AZURE_SQL_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: azure-sql-secret
                  key: USER_SERVICE_DATASOURCE_URL
            - name: AZURE_SQL_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: azure-sql-secret
                  key: AZURE_SQL_USERNAME
            - name: AZURE_SQL_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: azure-sql-secret
                  key: AZURE_SQL_PASSWORD
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: "update"
            - name: SERVER_PORT
              value: "8081"
            - name: FEATURE_AZURE_SQL_ENABLED
              value: "true"
            - name: FEATURE_COSMOS_CATALOG_ENABLED
              value: "false"
            - name: FEATURE_COSMOS_CART_ENABLED
              value: "false"
            - name: FEATURE_SERVICEBUS_ENABLED
              value: "false"
            - name: FEATURE_AISEARCH_ENABLED
              value: "false"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: cloud-project
spec:
  selector:
    app: user-service
  ports:
    - port: 8081
      targetPort: 8081
