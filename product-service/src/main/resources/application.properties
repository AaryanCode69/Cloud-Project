# ========================
# Server
# ========================
spring.application.name=product-service
server.port=${SERVER_PORT:8082}

# ========================
# Database (PostgreSQL — default profile)
# ========================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/productdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ========================
# JPA / Hibernate
# ========================
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ========================
# Feature Flags
# ========================
feature.azure-sql-enabled=${FEATURE_AZURE_SQL_ENABLED:false}
feature.cosmos-catalog-enabled=${FEATURE_COSMOS_CATALOG_ENABLED:false}
feature.cosmos-cart-enabled=${FEATURE_COSMOS_CART_ENABLED:false}

# ========================
# Azure Cosmos DB (Catalog)
# ========================
cosmos.endpoint=${AZURE_COSMOS_ENDPOINT:}
cosmos.key=${AZURE_COSMOS_KEY:}
cosmos.database=${AZURE_COSMOS_DATABASE:cloudproject}
cosmos.catalog-container=${AZURE_COSMOS_CATALOG_CONTAINER:catalog}

# ========================
# Actuator
# ========================
management.endpoints.web.exposure.include=health,info
