spring:
  application:
    name: product-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:postgres}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://login.microsoftonline.com/${entra.tenant-id}/v2.0
          jwk-set-uri: https://login.microsoftonline.com/${entra.tenant-id}/discovery/v2.0/keys
          audiences: ${entra.api-audience}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}

server:
  port: ${SERVER_PORT:8082}

entra:
  tenant-id: ${AZURE_ENTRA_TENANT_ID:11111111-1111-1111-1111-111111111111}
  client-id: ${AZURE_ENTRA_CLIENT_ID:22222222-2222-2222-2222-222222222222}
  api-audience: ${AZURE_ENTRA_API_AUDIENCE:api://22222222-2222-2222-2222-222222222222}

cosmos:
  endpoint: ${AZURE_COSMOS_ENDPOINT:}
  key: ${AZURE_COSMOS_KEY:}
  database: ${AZURE_COSMOS_DATABASE:cloudproject}
  catalog-container: ${AZURE_COSMOS_CATALOG_CONTAINER:catalog}

search:
  endpoint: ${AZURE_SEARCH_ENDPOINT:}
  api-key: ${AZURE_SEARCH_API_KEY:}
  index-name: ${AZURE_SEARCH_INDEX_NAME:products}
  semantic-configuration-name: ${AZURE_SEARCH_SEMANTIC_CONFIGURATION_NAME:products-semantic-config}
  semantic-enabled: ${AZURE_SEARCH_SEMANTIC_ENABLED:false}
  fuzzy-enabled: ${AZURE_SEARCH_FUZZY_ENABLED:true}
  top: ${AZURE_SEARCH_TOP:20}

feature:
  cosmos-catalog-enabled: ${FEATURE_COSMOS_CATALOG_ENABLED:false}
  cosmos-cart-enabled: ${FEATURE_COSMOS_CART_ENABLED:false}
  servicebus-enabled: ${FEATURE_SERVICEBUS_ENABLED:false}
  aisearch-enabled: ${FEATURE_AISEARCH_ENABLED:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info

---
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: ${POSTGRES_DATASOURCE_URL:jdbc:postgresql://postgres:5432/productdb}
    username: ${POSTGRES_DATASOURCE_USERNAME:postgres}
    password: ${POSTGRES_DATASOURCE_PASSWORD:postgres}
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
