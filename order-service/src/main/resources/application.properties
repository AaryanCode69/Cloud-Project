# ========================
# Server
# ========================
spring.application.name=order-service
server.port=${SERVER_PORT:8084}

# ========================
# Database (PostgreSQL — default profile)
# ========================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/orderdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ========================
# JPA / Hibernate
# ========================
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ========================
# Feature Flags
# ========================
feature.azure-sql-enabled=${FEATURE_AZURE_SQL_ENABLED:false}
feature.cosmos-catalog-enabled=${FEATURE_COSMOS_CATALOG_ENABLED:false}
feature.cosmos-cart-enabled=${FEATURE_COSMOS_CART_ENABLED:false}

# ========================
# Azure Cosmos DB (Cart)
# ========================
cosmos.endpoint=${AZURE_COSMOS_ENDPOINT:}
cosmos.key=${AZURE_COSMOS_KEY:}
cosmos.database=${AZURE_COSMOS_DATABASE:cloudproject}
cosmos.cart-container=${AZURE_COSMOS_CART_CONTAINER:cart}

# ========================
# External Service URLs
# ========================
external.product-service.url=${EXTERNAL_PRODUCT_SERVICE_URL:http://localhost:8082}
external.inventory-service.url=${EXTERNAL_INVENTORY_SERVICE_URL:http://localhost:8083}

# ========================
# Actuator
# ========================
management.endpoints.web.exposure.include=health,info
