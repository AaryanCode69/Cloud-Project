# ========================
# Azure SQL Database Config
# ========================
# Activated when SPRING_PROFILES_ACTIVE=azure-sql
spring.datasource.url=${AZURE_SQL_DATASOURCE_URL}
spring.datasource.username=${AZURE_SQL_DATASOURCE_USERNAME}
spring.datasource.password=${AZURE_SQL_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
